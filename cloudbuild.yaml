steps:
# 1. Build image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-east1-docker.pkg.dev/gcp-demo-project-487205/cloud-build-demo/static-site:$SHORT_SHA', '.']

# 2. Push image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-east1-docker.pkg.dev/gcp-demo-project-487205/cloud-build-demo/static-site:$SHORT_SHA']

# 3. Deploy to GKE
- name: 'gcr.io/cloud-builders/kubectl'
  args:
    - set
    - image 
    - deployment/static-site
    - static-site=us-esat1-docker.pkg.dev/gcp-demo-project-487205/cloud-build-demo/static-site:$SHORT_SHA
  env:
    - 'CLOUDSDK_COMPUTE_REGION=us-central1-c'
    - 'CLOUDSDK_CONTAINER_CLUSTER=terraform-gke-cluster'

images:
- 'us-east1-docker.pkg.dev/gcp-demo-project-487205/cloud-build-demo/static-site:$SHORT_SHA'

options:
  logging: 'CLOUD_LOGGING_ONLY'
