apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: static-site
  template:
    metadata:
      labels:
        app: static-site
    spec:
      containers:
      - name: static-site
        image: us-east1-docker.pkg.dev/gcp-demo-project-487205/cloud-build-demo/static-site:v1
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: static-site-service
spec:
  type: LoadBalancer
  selector:
    app: static-site
  ports:
  - port: 80
    targetPort: 80
